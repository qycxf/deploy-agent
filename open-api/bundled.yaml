openapi: 3.0.3
info:
  title: Deploy Agent API
  version: 0.1.1
  description: API for managing deployments and health checks
servers:
  - url: 'http://localhost:8080'
paths:
  /health:
    get:
      summary: Service health
      responses:
        '200':
          description: healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/login:
    post:
      summary: Login and receive a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            examples:
              authExample:
                summary: Example login payload
                value:
                  username: demo
                  password: secret
      responses:
        '200':
          description: authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /deployments:
    get:
      summary: List deployments
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: list of deployments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentList'
    post:
      summary: Create a deployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
            examples:
              createDeployment:
                summary: Example create deployment payload
                value:
                  name: example-service
                  version: v1.2.3
                  config:
                    replicas: 3
                    env:
                      - name: LOG_LEVEL
                        value: info
      responses:
        '201':
          description: deployment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          description: invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  '/deployments/{id}':
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Get a deployment by id
      responses:
        '200':
          description: deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a deployment
      responses:
        '204':
          description: deleted
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /metrics:
    get:
      summary: Prometheus metrics endpoint (text/plain)
      responses:
        '200':
          description: prometheus metrics
          content:
            text/plain: {}
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        uptime_seconds:
          type: number
          format: double
    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        expires_in:
          type: integer
          example: 3600
    Deployment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum:
            - pending
            - running
            - failed
            - succeeded
        created_at:
          type: string
          format: date-time
    CreateDeploymentRequest:
      type: object
      required:
        - name
        - version
      properties:
        name:
          type: string
        version:
          type: string
        config:
          type: object
          additionalProperties: true
    DeploymentList:
      type: object
      properties:
        total:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Deployment'
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
