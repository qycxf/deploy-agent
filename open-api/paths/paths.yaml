paths:
  /health:
    get:
      summary: Service health
      responses:
        '200':
          description: healthy
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/HealthResponse'

  /auth/login:
    post:
      summary: Login and receive a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/schemas/AuthRequest'
            examples:
              authExample:
                $ref: '../components/examples.yaml#/examples/AuthRequestExample'
      responses:
        '200':
          description: authentication successful
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/AuthResponse'
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/Error'

  /deployments:
    get:
      summary: List deployments
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: list of deployments
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/DeploymentList'

    post:
      summary: Create a deployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/schemas/CreateDeploymentRequest'
            examples:
              createDeployment:
                $ref: '../components/examples.yaml#/examples/CreateDeploymentExample'
      responses:
        '201':
          description: deployment created
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/Deployment'
        '400':
          description: invalid input
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/Error'

  /deployments/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Get a deployment by id
      responses:
        '200':
          description: deployment
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/Deployment'
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/Error'

    delete:
      summary: Delete a deployment
      responses:
        '204':
          description: deleted
        '404':
          description: not found
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/schemas/Error'

  /metrics:
    get:
      summary: Prometheus metrics endpoint (text/plain)
      responses:
        '200':
          description: prometheus metrics
          content:
            text/plain: {}
